# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "gh-pages" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # The type of runner that the job will run on
    runs-on: ubuntu-24.04
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: Etc/UTC
        run: |
          sudo apt update
          sudo debconf-set-selections <<< "postfix postfix/main_mailer_type string 'No configuration'"
          sudo apt install -y emacs-nox make npm texlive texlive-pictures
          npm install cheerio highlight.js html-entities
      - name: Obtain Emacs packages
        run: |
          wget -qO- https://api.github.com/repos/andras-simonyi/citeproc-el/releases/latest | jq -r .tarball_url | wget -qi- -Ociteproc.tar.gz
          mkdir -p citeproc
          tar xvf citeproc.tar.gz --strip-components=1 --directory=citeproc
      - name: Generate blog
        env:
          BLOG_PREFIX: ${{ github.repository }}
          BLOG_CITEPROC_LOCATION: citeproc
        run: |
          export BLOG_PREFIX="/${BLOG_PREFIX#*/}"
          make -C content
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
